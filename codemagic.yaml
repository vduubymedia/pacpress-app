workflows:
  ios_testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        provisioning_profiles:
          - WhiteSails Remote app store
        certificates:
          - Apple Distribution

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build (no codesign)
        script: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Apply signing profiles (Runner project)
        script: |
          xcode-project use-profiles --project "ios/Runner.xcodeproj"

      - name: Archive (xcodebuild workspace)
        script: |
          xcodebuild \
            -workspace "ios/Runner.xcworkspace" \
            -scheme "Runner" \
            -configuration "Release" \
            -sdk "iphoneos" \
            -archivePath "$CM_BUILD_DIR/build/ios/Runner.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Debug provisioning profiles
        script: |
          echo "== Profiles directory =="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          echo "== Code signing identities =="
          security find-identity -p codesigning -v || true

      - name: Debug installed provisioning profiles (pre-export)
        script: |
          echo "== Find profiles matching bundle id =="
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            echo "---- $f ----"
            /usr/bin/security cms -D -i "$f" | /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /dev/stdin 2>/dev/null || true
            /usr/bin/security cms -D -i "$f" | /usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' /dev/stdin 2>/dev/null || true
          done || true

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/ios/export_options.plist"

    artifacts:
      - "build/ios/ipa/*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true