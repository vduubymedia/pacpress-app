workflows:
  ios_testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        provisioning_profiles:
          - WhiteSails Remote app store
        certificates:
          - Apple Distribution

    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Flutter build (no codesign)
        script: |
          flutter clean
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Apply signing profiles (workspace)
        script: |
          xcode-project use-profiles --workspace "ios/Runner.xcworkspace"

      - name: Archive (xcodebuild workspace)
        script: |
          xcodebuild \
            -workspace "ios/Runner.xcworkspace" \
            -scheme "Runner" \
            -configuration "Release" \
            -sdk "iphoneos" \
            -archivePath "$CM_BUILD_DIR/build/ios/Runner.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/Runner.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/ios/export_options.plist"

    artifacts:
      - "build/ios/ipa/*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true